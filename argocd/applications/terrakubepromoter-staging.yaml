# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
# =============================================================================
# Application — TerraKubePromoter staging
# ArgoCD reconciles the staging overlay from Git into the
# terrakubepromoter-staging namespace on the in-cluster server
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terrakubepromoter-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: terrakubepromoter

  source:
    repoURL: https://github.com/fred1717/TerraKubePromoter
    targetRevision: HEAD
    path: manifests/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: terrakubepromoter-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
