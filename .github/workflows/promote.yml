name: promote

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to promote (semver-gitsha format, as built by app-ci.yml)
        required: true
        type: string

permissions: {}

concurrency:
  group: promote-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  promote:
    name: promote-to-${{ inputs.target_env }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials via OIDC (production only)
        if: inputs.target_env == 'production'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.GHA_PROMOTE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve image reference for the target environment
        id: image
        run: |
          REGISTRY=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          REPOSITORY=${{ vars.ECR_REPOSITORY_NAME }}
          if [ "${{ inputs.target_env }}" = "production" ]; then
            DIGEST=$(aws ecr describe-images --repository-name "$REPOSITORY" --image-ids imageTag=${{ inputs.image_tag }} --query 'imageDetails[0].imageDigest' --output text)
            echo "reference=${REGISTRY}/${REPOSITORY}@${DIGEST}" >> "$GITHUB_OUTPUT"
          else
            echo "reference=${REGISTRY}/${REPOSITORY}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update target overlay
        working-directory: manifests/overlays/${{ inputs.target_env }}
        run: kustomize edit set image ${{ vars.ECR_REPOSITORY_NAME }}=${{ steps.image.outputs.reference }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/${{ inputs.target_env }}/kustomization.yaml
          git commit -m "chore(${{ inputs.target_env }}): promote ${{ inputs.image_tag }}"
          git push
