name: app-ci

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - manifests/overlays/dev/kustomization.yaml
      - .github/workflows/app-ci.yml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/requirements.txt
      - name: Install dependencies
        working-directory: app
        run: pip install --require-hashes -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        working-directory: app
        run: pytest --strict-markers

  build-push:
    name: build-and-push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Resolve image tag (semver + short SHA)
        id: version
        run: echo "tag=$(cat app/VERSION)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.GHA_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@1629cc33a9521f764a4704d4d0387513918873b9  # v2.0.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build and push with bake
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8  # v7.1.0
        with:
          workdir: app
          files: app/docker-bake.hcl
          push: true
          set: |
            app.args.APP_VERSION=${{ steps.version.outputs.tag }}
            app.args.GIT_SHA=${{ github.sha }}
            app.tags=${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:${{ steps.version.outputs.tag }}

  update-dev-overlay:
    name: update-dev-overlay
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update dev overlay image tag
        working-directory: manifests/overlays/dev
        run: |
          kustomize edit set image ${{ vars.ECR_REPOSITORY_NAME }}=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY_NAME }}:${{ needs.build-push.outputs.image_tag }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/dev/kustomization.yaml
          git commit -m "chore(dev): promote image ${{ needs.build-push.outputs.image_tag }}"
          git push
