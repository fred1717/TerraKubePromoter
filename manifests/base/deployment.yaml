# =============================================================================
# Base Deployment for the Flask API
# =============================================================================
# Overlays patch:
#   - spec.replicas (per environment)
#   - spec.template.spec.containers[0].image (per environment, via images
#     transformer in kustomization.yaml)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: terrakubepromoter-app
  labels:
    app.kubernetes.io/name: terrakubepromoter-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: terrakubepromoter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: terrakubepromoter-app
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terrakubepromoter-app
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: terrakubepromoter
    spec:
      serviceAccountName: terrakubepromoter-app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: terrakubepromoter-app:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: GIT_SHA
              value: "unknown"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
