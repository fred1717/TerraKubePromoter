# =============================================================================
# Base RoleBinding for the Flask API
# =============================================================================
# Binds the empty Role to the ServiceAccount within the same namespace.
# The binding exists to demonstrate the RBAC wiring pattern and to be ready
# for future permissions added to the Role.
# =============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: terrakubepromoter-app
  labels:
    app.kubernetes.io/name: terrakubepromoter-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: terrakubepromoter
subjects:
  - kind: ServiceAccount
    name: terrakubepromoter-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: terrakubepromoter-app
