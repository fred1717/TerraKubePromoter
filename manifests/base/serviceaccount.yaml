# =============================================================================
# Base ServiceAccount for the Flask API
# =============================================================================
# Dedicated pod identity following the least-privilege principle.
# The Flask API does not call the Kubernetes API, so:
#   - no Role grants API permissions (an empty Role and RoleBinding exist as
#     placeholders for future use)
#   - automountServiceAccountToken is disabled on the Deployment
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: terrakubepromoter-app
  labels:
    app.kubernetes.io/name: terrakubepromoter-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: terrakubepromoter
automountServiceAccountToken: false
