# =============================================================================
# Production overlay
# =============================================================================
# References the base and layers environment-specific concerns:
#   - namespace transformer: applies terrakubepromoter-production to all
#     resources
#   - image transformer: replaces the base placeholder with the ECR image
#   - labels: adds app.kubernetes.io/instance and app.kubernetes.io/version
#   - patches: sets replica count (3) and the GIT_SHA environment variable
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: terrakubepromoter-production

resources:
  - ../../base
  - namespace.yaml
  - resourcequota.yaml

components:
  - ../../components/networkpolicy

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/instance: terrakubepromoter-production
      app.kubernetes.io/version: 0.1.3

images:
  - name: terrakubepromoter-app
    newName: 180294215772.dkr.ecr.us-east-1.amazonaws.com/terrakubepromoter-dev-app
    digest: "sha256:c40def269ce25d0bcace22e78772bbd354cca0444b826b27b161c387d244b524"

patches:
  - target:
      kind: Deployment
      name: terrakubepromoter-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "0854d11"
