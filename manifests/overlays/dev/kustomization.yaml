# =============================================================================
# Dev overlay
# =============================================================================
# References the base and layers environment-specific concerns:
#   - namespace transformer: applies terrakubepromoter-dev to all resources
#   - image transformer: replaces the base placeholder with the ECR image
#   - labels: adds app.kubernetes.io/instance and app.kubernetes.io/version
#   - patches: sets replica count (1) and the GIT_SHA environment variable
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: terrakubepromoter-dev

resources:
  - ../../base
  - namespace.yaml
  - resourcequota.yaml
  - networkpolicy.yaml

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/instance: terrakubepromoter-dev
      app.kubernetes.io/version: 0.1.2

images:
  - name: terrakubepromoter-app
    newName: 180294215772.dkr.ecr.us-east-1.amazonaws.com/terrakubepromoter-dev-app
    newTag: "0.1.2"

patches:
  - target:
      kind: Deployment
      name: terrakubepromoter-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "d4d92a3"
