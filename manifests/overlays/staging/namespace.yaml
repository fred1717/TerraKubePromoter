# =============================================================================
# Staging namespace
# =============================================================================
# Pod Security Standards enforced at namespace level, restricted profile,
# pinned to v1.35.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: terrakubepromoter-staging
  labels:
    app.kubernetes.io/name: terrakubepromoter-app
    app.kubernetes.io/part-of: terrakubepromoter
    app.kubernetes.io/instance: terrakubepromoter-staging
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
