# =============================================================================
# Staging namespace ResourceQuota
# =============================================================================
# Identical to dev per Decision 6 (uniform quotas across environments).
# =============================================================================

apiVersion: v1
kind: ResourceQuota
metadata:
  name: terrakubepromoter-app
  labels:
    app.kubernetes.io/name: terrakubepromoter-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: terrakubepromoter
spec:
  hard:
    requests.cpu: 500m
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 1Gi
    pods: "10"
